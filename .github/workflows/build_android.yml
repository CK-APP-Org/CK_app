name: Build (& Deploy to Google Play) Android APP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
          cache: "gradle"
          cache-dependency-path: "src-capacitor/android/build.gradle"
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: Derive version from tag
        id: version
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
          else
            # Manual runs off a branch: keep a valid, non-conflicting version
            VERSION="0.0.0-${REF}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building versionName=$VERSION versionCode=${{ github.run_number }}"

      - name: Install dependencies
        run: |
          npm install -g yarn @quasar/cli
          yarn install --frozen-lockfile

      - name: Build Quasar app for Android (Capacitor)
        env:
          METRO_API_USER: ${{ secrets.METRO_API_USER }}
          METRO_API_PASS: ${{ secrets.METRO_API_PASS }}
        run: yarn android

      - name: Apply version from tag to Android project
        run: |
          cd src-capacitor/android/app
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.version }}\"/" build.gradle
          grep -E "versionCode|versionName" build.gradle

      - name: Assemble AAB and APK
        run: |
          chmod +x src-capacitor/android/gradlew
          cd src-capacitor/android
          ./gradlew bundle assembleRelease

      - uses: r0adkll/sign-android-release@v1
        name: Sign app AAB
        id: sign_aab
        with:
          releaseDirectory: src-capacitor/android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.PLAY_SIGNING_KEY }}
          alias: ${{ secrets.PLAY_SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.PLAY_SIGNING_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.PLAY_SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - uses: r0adkll/sign-android-release@v1
        name: Sign app APK
        id: sign_apk
        with:
          releaseDirectory: src-capacitor/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.PLAY_SIGNING_KEY }}
          alias: ${{ secrets.PLAY_SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.PLAY_SIGNING_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.PLAY_SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Collect signed artifacts
        run: |
          cp "${{ steps.sign_aab.outputs.signedReleaseFile }}" "CK_app-${{ steps.version.outputs.version }}.aab"
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" "CK_app-${{ steps.version.outputs.version }}.apk"

      - name: Archive Android build output
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            CK_app-${{ steps.version.outputs.version }}.aab
            CK_app-${{ steps.version.outputs.version }}.apk

      - name: Publish APK/AAB to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            CK_app-${{ steps.version.outputs.version }}.apk
            CK_app-${{ steps.version.outputs.version }}.aab

  deploy-android:
    name: Deploy Android to Google Play
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Android build output
        uses: actions/download-artifact@v5
        with:
          name: android-build

      - name: Deploy to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: "org.capacitor.quasar.ckapp"
          releaseFiles: "*.aab"
          track: "internal"
          inAppUpdatePriority: 3
